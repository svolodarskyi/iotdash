# Soak test company/device layout
# Used by tools/soak_provision.py to create orgs, users, and devices via the backend API.
# Device codes are auto-generated as: {org_slug}-device-{0000..N}
# The simulator uses these codes as MQTT client IDs.

companies:
  - name: "Acme Manufacturing"
    slug: acme
    devices: 300
    metrics: [temperature, humidity, engine_rpm]
    users:
      - email: viewer@acme.test
        password: AcmeView123!
        role: viewer

