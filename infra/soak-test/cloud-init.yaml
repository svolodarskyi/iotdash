#cloud-config

package_update: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - python3
  - python3-pip
  - python3-venv
  - jq
  - bc

runcmd:
  # Install Docker
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker azureuser

  # Install docker compose plugin
  - mkdir -p /usr/local/lib/docker/cli-plugins
  - curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

  # Configure Docker log rotation to prevent disk fill
  - |
    cat > /etc/docker/daemon.json <<'EOF'
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "50m",
        "max-file": "3"
      }
    }
    EOF
  - systemctl restart docker

  # Log into ACR
  - docker login ${acr_login_server} -u ${acr_username} -p '${acr_password}'

  # Clone repo and fix git ownership for CI/CD (azureuser runs git via SSH)
  - git clone --branch ${github_branch} ${github_repo} /opt/iotdash
  - chown -R azureuser:azureuser /opt/iotdash
  - su - azureuser -c "git config --global --add safe.directory /opt/iotdash"

  # Start the stack (production mode - no soak testing)
  - cd /opt/iotdash && docker compose -f docker-compose.yml up -d --build

  # Set InfluxDB retention policy to 14 days (after services are up)
  - |
    sleep 90
    docker exec influxdb influx bucket update \
      --name iot \
      --retention 336h \
      --org iotorg \
      --token mytoken123 || true
