#cloud-config

package_update: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - python3
  - python3-pip
  - python3-venv
  - jq
  - bc

runcmd:
  # Install Docker
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker azureuser

  # Install docker compose plugin
  - mkdir -p /usr/local/lib/docker/cli-plugins
  - curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

  # Clone repo
  - git clone --branch ${github_branch} ${github_repo} /opt/iotdash
  - chown -R azureuser:azureuser /opt/iotdash

  # Start the stack with soak overrides
  - cd /opt/iotdash && docker compose -f docker-compose.yml -f docker-compose.soak.yml up -d --build

  # Install Python deps for simulator
  - python3 -m venv /opt/iotdash/.venv
  - /opt/iotdash/.venv/bin/pip install aiomqtt

  # Start the simulator in a tmux/screen-less background process
  - |
    cat > /etc/systemd/system/soak-simulator.service <<'EOF'
    [Unit]
    Description=IoTDash Soak Test Simulator
    After=docker.service
    Requires=docker.service

    [Service]
    Type=simple
    User=azureuser
    WorkingDirectory=/opt/iotdash
    ExecStartPre=/bin/sleep 60
    ExecStart=/opt/iotdash/.venv/bin/python tools/soak_simulator.py --devices ${device_count} --interval ${publish_interval} --broker localhost --port 1883 --ramp-rate 5
    Restart=on-failure
    RestartSec=30

    [Install]
    WantedBy=multi-user.target
    EOF
  - systemctl daemon-reload
  - systemctl enable soak-simulator
  - systemctl start soak-simulator

  # Set up monitoring cron
  - chmod +x /opt/iotdash/tools/soak_monitor.sh
  - chmod +x /opt/iotdash/tools/soak_alerter.sh
  - |
    crontab -u azureuser - <<'CRON'
    */5 * * * * /opt/iotdash/tools/soak_monitor.sh >> /opt/iotdash/soak-monitor.log 2>&1
    */15 * * * * ALERT_WEBHOOK_URL="${alert_webhook_url}" /opt/iotdash/tools/soak_alerter.sh >> /opt/iotdash/soak-alerter.log 2>&1
    CRON

  # Set InfluxDB retention policy to 14 days (after services are up)
  - |
    sleep 90
    docker exec influxdb influx bucket update \
      --name iot \
      --retention 336h \
      --org iotorg \
      --token mytoken123 || true

  # Configure Docker log rotation to prevent disk fill
  - |
    cat > /etc/docker/daemon.json <<'EOF'
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "50m",
        "max-file": "3"
      }
    }
    EOF
  - systemctl restart docker
  - cd /opt/iotdash && docker compose -f docker-compose.yml -f docker-compose.soak.yml up -d
