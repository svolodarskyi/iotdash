# Telegraf: MQTT -> InfluxDB bridge — tuned for soak test (~200 msg/s)

[agent]
  interval = "5s"
  flush_interval = "5s"
  metric_batch_size = 10000
  metric_buffer_limit = 100000
  collection_jitter = "1s"

# ── Input: subscribe to EMQX MQTT ─────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://emqx:1883"]
  topics  = ["+/from/message"]
  qos = 0
  data_format = "json"
  topic_tag = "topic"
  max_undelivered_messages = 10000

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "+/from/message"
    tags  = "device_id/_/_"

# ── Input: Telegraf internal metrics (detect drops) ─
[[inputs.internal]]
  collect_memstats = false
  [inputs.internal.tags]
    source = "telegraf-soak"

# ── Output: write to InfluxDB v2 ──────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "mytoken123"
  organization = "iotorg"
  bucket       = "iot"
  content_encoding = "gzip"
