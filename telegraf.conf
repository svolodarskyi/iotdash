# Telegraf: bridge MQTT → InfluxDB

[agent]
  interval = "1s"
  flush_interval = "1s"

# ── Input: subscribe to EMQX MQTT ─────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://emqx:1883"]
  topics  = ["iot/+/mo/message"]
  qos = 0
  data_format = "json"
  topic_tag = "topic"

  # Extract device_id from topic: iot/<device_id>/mo/message
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "iot/+/mo/message"
    tags  = "_/device_id/_/_"

# ── Processor: decode MQTT messages ───────────────
[[processors.execd]]
  command = ["/usr/bin/python3", "/etc/telegraf/scripts/telegraf_decoder.py"]
  data_format = "influx"

# ── Output: write to InfluxDB v2 ──────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "mytoken123"
  organization = "iotorg"
  bucket       = "iot"
