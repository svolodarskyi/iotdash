name: Soak Test — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose*.yml"
      - "telegraf*.conf"
      - ".github/workflows/soak-deploy.yml"
  workflow_dispatch:
    inputs:
      device_count:
        description: "Number of simulated devices"
        required: false
        default: "1000"
      publish_interval:
        description: "Publish interval (seconds)"
        required: false
        default: "5"

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/iotdash-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/iotdash-frontend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Soak VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SOAK_VM_HOST }}
          username: azureuser
          key: ${{ secrets.SOAK_VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            cd /opt/iotdash

            # Pull latest code
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # Log into ACR and pull new images
            sudo docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p '${{ secrets.ACR_PASSWORD }}'
            sudo docker pull ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            sudo docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            sudo docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.BACKEND_IMAGE }}:latest
            sudo docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.FRONTEND_IMAGE }}:latest

            # Restart the stack
            sudo ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }} docker compose -f docker-compose.yml -f docker-compose.soak.yml up -d

            # Restart the simulator with new settings
            sudo systemctl restart soak-simulator || true

            # Show status
            sudo docker compose -f docker-compose.yml -f docker-compose.soak.yml ps
            echo ""
            echo "Deployed commit: ${{ github.sha }}"
